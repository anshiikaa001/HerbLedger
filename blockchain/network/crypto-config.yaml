# Crypto configuration for HERBLEDGER network
# This file defines the network topology and cryptographic material generation

OrdererOrgs:
  - Name: Orderer
    Domain: herbledger.com
    EnableNodeOUs: true
    Specs:
      - Hostname: orderer
        SANS:
          - localhost

PeerOrgs:
  # Farmers and Collectors Organization
  - Name: Org1
    Domain: org1.herbledger.com
    EnableNodeOUs: true
    Template:
      Count: 2
      SANS:
        - localhost
    Users:
      Count: 2

  # Processors and Manufacturers Organization  
  - Name: Org2
    Domain: org2.herbledger.com
    EnableNodeOUs: true
    Template:
      Count: 2
      SANS:
        - localhost
    Users:
      Count: 2

  # Testing Laboratories Organization
  - Name: Org3
    Domain: org3.herbledger.com
    EnableNodeOUs: true
    Template:
      Count: 1
      SANS:
        - localhost
    Users:
      Count: 2

  # Regulatory and Compliance Organization
  - Name: Org4
    Domain: org4.herbledger.com
    EnableNodeOUs: true
    Template:
      Count: 1
      SANS:
        - localhost
    Users:
      Count: 1
